name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run pytest
        run: pytest test_convert_poly.py -v

  powershell-tests:
    # Matrix runs the same Pester suite under both PowerShell hosts
    # available on Windows runners:
    #   - pwsh:        PowerShell 7+ (cross-platform, .NET Core)
    #   - powershell:  Windows PowerShell 5.1 (built into Windows, .NET Framework)
    # CHS users overwhelmingly have 5.1, so coverage there is the point.
    name: PowerShell tests (Windows, ${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [pwsh, powershell]
    steps:
      - uses: actions/checkout@v4
      - name: Show host PowerShell + Pester version
        shell: ${{ matrix.shell }}
        run: |
          $PSVersionTable | Format-List
          Get-Module -ListAvailable Pester | Select-Object Name, Version, Path
      - name: Run Pester tests
        shell: ${{ matrix.shell }}
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -ErrorAction Stop
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './convert_poly.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
